<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Portfolio tracker</title>
  </head>

  <body>
    <div class="container">
      <header>
        <div class="nav-bar">
            <div class="logo">
              <p> <a href="/Homepage/index.html">Portfolio Tracker</a></p>
            </div>
            <div id="nav-svg">
              <i class="fa-solid fa-bars-staggered"> </i>
            </div>
            <div class="nav-links">
              <nav>
                <a href="">Homepage</a>
                <a href="">Profile</a>
                <a href="">Contact Us</a>
              </nav>
            </div>
        </div>
       <div>
        <h1>Code Learning + Portfolio Tracker</h1>
       </div>
      </header>

      <main>

       <div class="cards">
            <section class="card card1">
                <p>Tracks what you have learned</p>
                <i class="fa-solid fa-calendar-days"></i>
            </section>

            <section class="card card2">
                <p>Your Mini Projects</p>
                <i class="fa-solid fa-code"></i> 
            </section>

            <section class="card card3">
                <p>Your Progress</p>
                <i class="fa-solid fa-chart-line"></i>
            </section>

            <section class="card card4">
                <p>Suggestions for your next Project</p>
                <i class="fa-solid fa-lightbulb"></i>
            </section>

        </div>

          <div class="build-mode">
            <button>
              Build Mode
            </button>
          </div>
        
      </main>

      <footer>
        <a href="">Privacy policy</a>
        <p>&copy; Demilade and Samuel 2026</p>
      </footer>

      <script src="/Homepage/script.js"></script>
    </div>
  </body>
</html>

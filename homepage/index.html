<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Portfolio tracker</title>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Code Learning + Portfolio Tracker</h1>
      </header>
      <main>
        <div class="cards">
          <section class="card1">
            <p>Tracks what you have learned</p>
            <i class="fa-solid fa-calendar-days"></i>
          </section>

          <section class="card2">
            <p>Your Mini Projects</p>
          </section>

          <section class="card3">
            <p>Your Progress</p>
          </section>

          <section class="card4">
            <p>Suggestions for your next Project</p>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
